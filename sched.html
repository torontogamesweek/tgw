<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Schedule — Toronto Games Week</title>

    <link href="styles.css" rel="stylesheet" type="text/css" />
    <link href="https://fonts.googleapis.com/css2?family=PT+Mono&display=swap" rel="stylesheet" />

    <meta name="author" content="Marie Claire LeBlanc Flanagan" />
    <meta name="description" content="Celebrating games in Toronto, Canada" />
    <meta property="og:title" content="Toronto Games Week — June 11–17, 2026" />
    <meta property="og:description" content="A week-long celebration of playful arts and games culture in Toronto, Canada. June 11–17, 2026." />
    <meta property="og:image" content="https://torontogamesweek.com/images/2026/tgw-poster-social-aspect-ratio.png" />
    <meta property="og:url" content="https://torontogamesweek.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:title" content="Toronto Games Week — June 11–17, 2026" />
    <meta name="twitter:description" content="A week-long celebration of playful arts and games culture in Toronto, Canada. June 11–17, 2026." />
    <meta name="twitter:image" content="https://torontogamesweek.com/images/2026/tgw-poster-social-aspect-ratio.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" href="/images/2026/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/images/2026/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/images/2026/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/images/2026/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/images/2026/favicon/site.webmanifest" />

    <style>
      /* ====================================================================
         SCHEDULE PAGE — scoped with .tgw- prefixes to avoid clashing with
         the shared styles.css (.event / .title / .date etc).
         Palette + fonts inherited from the site: Alegreya (display),
         Merriweather (body), purple #5f32f3, blue wash #b8d8f0.
         ==================================================================== */

      :root {
        --tgw-purple: #5f32f3;
        --tgw-purple-soft: rgba(95, 50, 243, 0.12);
        --tgw-purple-line: rgba(95, 50, 243, 0.22);
        --tgw-ink: rgba(14, 8, 42, 0.86);
        --tgw-ink-soft: rgba(14, 8, 42, 0.55);
        --tgw-ink-faint: rgba(14, 8, 42, 0.38);
        --tgw-coral: #fc6f44;
        --tgw-card: rgba(255, 255, 255, 0.97);
        --tgw-blue: #b8d8f0;
      }

      /* Page sits right below the logo header (no full-screen poster here) */
      #posterContainer,
      canvas#canvas { display: none !important; }

      /* Safety net: this page has no poster/canvas overlay, so all schedule
         content must be interactive even if #main-schedule ever carries the
         shared .no-pointer-events class. */
      #main-schedule,
      #tgw-now,
      #tgw-controls,
      #schedule-body,
      #schedule-container,
      .tgw-event,
      .tgw-now-inner,
      .tgw-day-pill,
      .tgw-type-chip,
      .tgw-star,
      .tgw-share,
      .tgw-action,
      .tgw-addr-link,
      .tgw-clear-all { pointer-events: auto; }

      #main-schedule {
        position: relative;
        z-index: 1;
        margin-top: 8rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 0;
      }
      @media (max-width: 767px) {
        #main-schedule { margin-top: 7rem; }
      }

 

      /* ── TIME-AWARE "NOW" BAND ─────────────────────────────── */
      .tgw-now { width: 100%; display: flex; justify-content: center; padding: 0 1rem; }
      .tgw-now:empty { display: none; }
      .tgw-now-inner {
        margin-top: 4rem;
        width: 100%;
        max-width: 820px;
        display: flex;
        gap: 1.25rem;
        flex-wrap: wrap;
        background: #fffaf3;
        border: 2px solid rgba(252, 111, 68, 0.35);
        border-radius: 14px;
        padding: 1.1rem 1.35rem;
        box-shadow: 0 4px 16px rgba(252, 111, 68, 0.08);
      }
      .tgw-now--before .tgw-now-inner {
        background: rgba(255, 255, 255, 0.85);
        border-color: var(--tgw-purple-line);
        box-shadow: none;
        flex-direction: column;
        text-align: center;
        align-items: center;
        gap: 0.2rem;
      }

      /* ── COUNTDOWN (before the festival) ───────────────────── */
      .tgw-now--before .tgw-now-inner.tgw-countdown {
        background: #fffaf3;
        border: 2px solid rgba(252, 111, 68, 0.4);
        gap: 0.6rem;
        padding: 1.4rem 1.35rem 1.25rem;
      }
      .tgw-cd-kicker {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 1rem;
        text-transform: uppercase;
        letter-spacing: 0.14em;
        color: var(--tgw-coral);
      }
      .tgw-cd-grid {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        gap: 0.4rem;
      }
      .tgw-cd-unit {
        display: flex;
        flex-direction: column;
        align-items: center;
        min-width: 3.6rem;
      }
      .tgw-cd-num {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 3.2rem;
        line-height: 1;
        color: var(--tgw-purple);
        font-variant-numeric: tabular-nums;
      }
      .tgw-cd-lab {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.72rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--tgw-ink-faint);
        margin-top: 0.15rem;
      }
      .tgw-cd-colon {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 2.4rem;
        line-height: 1;
        color: var(--tgw-purple-line);
        padding-top: 0.25rem;
      }
      .tgw-cd-sub {
        font-family: "Merriweather", serif;
        font-size: 0.82rem;
        color: var(--tgw-ink-soft);
      }

      /* ── "WE'VE BEGUN" celebration (first minute of the festival) ── */
      .tgw-now--begun .tgw-now-inner.tgw-begun {
        position: relative;
        overflow: hidden;
        flex-direction: column;
        align-items: center;
        text-align: center;
        gap: 0.35rem;
        background: #fffaf3;
        border: 2px solid rgba(252, 111, 68, 0.55);
        box-shadow: 0 8px 28px rgba(252, 111, 68, 0.16);
        padding: 1.6rem 1.35rem 1.5rem;
        animation: tgw-begun-pop 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28) both;
      }
      .tgw-begun-kicker {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.22em;
        color: var(--tgw-coral);
        animation: tgw-begun-rise 0.5s ease 0.05s both;
      }
      .tgw-begun-title {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 2.1rem;
        line-height: 1.1;
        margin: 0;
        color: var(--tgw-purple);
        animation: tgw-begun-rise 0.5s ease 0.12s both;
      }
      .tgw-begun-sub {
        font-family: "Merriweather", serif;
        font-size: 0.9rem;
        line-height: 1.5;
        color: var(--tgw-ink-soft);
        margin: 0;
        max-width: 460px;
        animation: tgw-begun-rise 0.5s ease 0.19s both;
      }
      .tgw-begun-spark {
        position: absolute;
        top: 0.9rem;
        font-size: 1.1rem;
        color: var(--tgw-coral);
        animation: tgw-begun-twinkle 1.6s ease-in-out infinite;
      }
      .tgw-begun-spark--l { left: 1.1rem; }
      .tgw-begun-spark--r { right: 1.1rem; animation-delay: 0.8s; }
      @keyframes tgw-begun-pop {
        from { opacity: 0; transform: scale(0.94) translateY(8px); }
        to   { opacity: 1; transform: scale(1) translateY(0); }
      }
      @keyframes tgw-begun-rise {
        from { opacity: 0; transform: translateY(6px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes tgw-begun-twinkle {
        0%, 100% { opacity: 0.35; transform: scale(0.85); }
        50%      { opacity: 1; transform: scale(1.15); }
      }
      @media (prefers-reduced-motion: reduce) {
        .tgw-now--begun .tgw-now-inner.tgw-begun,
        .tgw-begun-kicker, .tgw-begun-title, .tgw-begun-sub,
        .tgw-begun-spark { animation: none; }
      }
      .tgw-live-dot {
        width: 8px; height: 8px; border-radius: 50%;
        background: var(--tgw-coral);
        box-shadow: 0 0 0 0 rgba(252, 111, 68, 0.6);
        animation: tgw-pulse 1.8s infinite;
        display: inline-block;
      }
      @keyframes tgw-pulse {
        0% { box-shadow: 0 0 0 0 rgba(252, 111, 68, 0.55); }
        70% { box-shadow: 0 0 0 7px rgba(252, 111, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(252, 111, 68, 0); }
      }

      /* ── STICKY CONTROLS ───────────────────────────────────── */
      #tgw-controls {
        position: sticky;
        top: 0;
        z-index: 100;
        width: 100%;
        margin-top: 1.25rem;
        margin-bottom: 1rem;
        background: rgba(184, 216, 240, 0.96);
        backdrop-filter: blur(6px);
        /* border-bottom: 1px solid var(--tgw-purple-line); */
      }
      .tgw-controls-inner {
        max-width: 860px;
        margin: 0 auto;
        padding: 0.7rem 1rem 0.6rem;
      }

      /* DAY TIMELINE — the prominent, primary control */
      .tgw-control-label {
        font-family: "Alegreya", sans-serif;
        font-size: 1rem;
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--tgw-ink-faint);
        display: block;
        margin-bottom: 0.4rem;
      }
      .tgw-day-row {
        display: flex;
        gap: 0.25rem;
        align-items: stretch;
        background: rgba(255, 255, 255, 0.5);
        border: 1.5px solid var(--tgw-purple-line);
        border-radius: 14px;
        padding: 0.28rem;
      }
      .tgw-day-pill {
        flex: 1 1 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.1rem;
        padding: 0.45rem 0.3rem 0.4rem;
        border-radius: 10px;
        border: 1.5px solid transparent;
        background: transparent;
        cursor: pointer;
        font-family: "Alegreya", sans-serif;
        transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
      }
      .tgw-day-pill:hover:not(.is-active):not(:disabled) {
        background: rgba(255, 255, 255, 0.95);
        border-color: transparent;
      }
      .tgw-day-pill.is-active {
        background: var(--tgw-purple);
        border-color: var(--tgw-purple);
        box-shadow: 0 3px 10px rgba(95, 50, 243, 0.28);
      }
      .tgw-day-pill .tgw-pill-top {
        display: flex;
        align-items: baseline;
        gap: 0.3rem;
        font-weight: bold;
        font-size: 1rem;
        color: var(--tgw-ink);
        letter-spacing: 0.02em;
        white-space: nowrap;
      }
      .tgw-day-pill .tgw-pill-abbr { text-transform: uppercase; }
      .tgw-day-pill .tgw-pill-date { color: var(--tgw-ink-soft); font-weight: bold; }
      .tgw-day-pill .tgw-pill-count {
        font-size: 0.72rem;
        font-weight: bold;
        color: var(--tgw-ink-faint);
      }
      .tgw-day-pill.is-active .tgw-pill-top,
      .tgw-day-pill.is-active .tgw-pill-date,
      .tgw-day-pill.is-active .tgw-pill-count { color: #fff; }
      .tgw-day-pill.is-empty { opacity: 0.4; cursor: default; }
.tgw-day-pill--all {
        flex: 0 0 auto;
        padding-left: 0.7rem;
        padding-right: 0.7rem;
        border: 1.5px dashed var(--tgw-purple-line);
        background: rgba(255, 255, 255, 0.55);
      }
      .tgw-day-pill--all.is-active { border-style: solid; }
      .tgw-day-pill--all .tgw-pill-top { flex-direction: row; }
      .tgw-day-pill--all .tgw-pill-top::before {
        content: "↺";
        margin-right: 0.25rem;
        color: var(--tgw-purple);
      }
      .tgw-day-pill--all.is-active .tgw-pill-top::before { color: #fff; }      .tgw-all-short { display: none; }

      /* TYPE CHIPS — secondary, lighter refinement */
      .tgw-type-wrap { margin-top: 0.7rem; }
      .tgw-type-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
      }
      .tgw-type-chip {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 1rem;
        padding: 0.2rem 0.7rem;
        border-radius: 2rem;
        border: 1.5px solid var(--tgw-purple-line);
        background: transparent;
        color: var(--tgw-ink-soft);
        cursor: pointer;
        transition: all 0.12s ease;
        letter-spacing: 0.01em;
      }
      .tgw-type-chip:hover { border-color: var(--tgw-purple); color: var(--tgw-purple); }
      .tgw-type-chip.is-active {
        background: var(--tgw-purple-soft);
        border-color: rgba(95, 50, 243, 0.55);
        color: var(--tgw-purple);
      }
      .tgw-type-chip--all {
        border-style: dashed;
        background: rgba(255, 255, 255, 0.55);
      }
      .tgw-type-chip--all::before {
        content: "↺";
        margin-right: 0.25rem;
        color: var(--tgw-purple);
      }
      .tgw-type-chip--all.is-active {
        background: transparent;
        color: var(--tgw-ink-faint);
        border-style: dashed;
      }

      /* "Filter by type" label — centred above the chips */
      .tgw-type-label {
        text-align: center;
        margin-top: 0.9rem;
        margin-bottom: 0.5rem;
      }

      /* Quick filters (Free / My stars) */
      .tgw-quick-row {
        display: flex;
        justify-content: center;
        flex-wrap: wrap;
        gap: 0.35rem;
        align-items: center;
        margin-top: 0.45rem;
      }
      .tgw-type-chip--free.is-active {
        background: rgba(103, 204, 94, 0.18);
        border-color: rgba(103, 204, 94, 0.6);
        color: #2f7a2a;
      }
      .tgw-type-chip--free:hover {
        border-color: rgba(103, 204, 94, 0.7);
        color: #2f7a2a;
      }
      .tgw-type-chip--star.is-active {
        background: rgba(245, 197, 66, 0.22);
        border-color: rgba(224, 168, 30, 0.7);
        color: #9a6a00;
      }
      .tgw-type-chip--star:hover {
        border-color: rgba(224, 168, 30, 0.7);
        color: #9a6a00;
      }

      /* result count line */
      #tgw-resultcount {
        width: 100%;
        max-width: 820px;
        margin: 1.25rem auto 0;
        padding: 0 1rem;
        font-family: "Alegreya", sans-serif;
        font-size: 0.85rem;
        font-weight: bold;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: var(--tgw-ink-faint);
        text-align: left;
      }

      /* ── SCHEDULE BODY ─────────────────────────────────────── */
      #schedule-body {
        width: 100%;
        max-width: 820px;
        padding: 0.75rem 1rem 4rem;
        margin: 0 auto;
      }

      /* DAY SEPARATORS */
      .tgw-day-sep {
        display: flex;
        align-items: baseline;
        gap: 1rem;
        margin: 2.5rem 0 1.1rem;
        padding-bottom: 0.45rem;
        border-bottom: 2px solid var(--tgw-purple-line);
        scroll-margin-top: 150px;
      }
      .tgw-day-sep:first-child { margin-top: 0.5rem; }
      .tgw-day-num {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 2rem;
        line-height: 1;
        background: #5e87f0;
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .tgw-day-text { display: flex; flex-direction: column; }
      .tgw-day-name {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 1.5rem;
        color: var(--tgw-ink);
        line-height: 1.1;
      }
      .tgw-day-full {
        font-family: "Merriweather", serif;
        font-size: 0.74rem;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--tgw-ink-faint);
        margin-top: 0.15rem;
      }
      .tgw-day-count {
        margin-left: auto;
        align-self: center;
        font-family: "Alegreya", sans-serif;
        font-size: 0.85rem;
        color: var(--tgw-ink-faint);
        white-space: nowrap;
      }

      /* ── EVENT CARD ────────────────────────────────────────── */
      .tgw-event { margin-bottom: 1rem; scroll-margin-top: 150px; }
      .tgw-card {
        position: relative;
        display: flex;
        flex-direction: column;
        gap: 0;
        background: var(--tgw-card);
        border: 1px solid var(--tgw-purple-soft);
        border-left: 3px solid var(--tgw-purple-line);
        border-radius: 12px;
        padding: 1.25rem 1.35rem;
        text-align: left;
        transition: border-color 0.2s ease, border-left-color 0.2s ease, box-shadow 0.2s ease;
      }
      .tgw-card:hover {
        border-left-color: rgba(95, 50, 243, 0.55);
        box-shadow: 0 3px 16px rgba(95, 50, 243, 0.09);
      }
      .tgw-card--live {
        border-left-color: var(--tgw-coral);
        border-color: rgba(252, 111, 68, 0.3);
        box-shadow: 0 3px 16px rgba(252, 111, 68, 0.1);
      }
      /* shared via link → thin yellow emphasis */
      .tgw-card--shared {
        border: 2px solid #f5c542;
        border-left: 3px solid #f5c542;
        box-shadow: 0 0 0 3px rgba(245, 197, 66, 0.18);
      }

      /* header row: avatar + (eyebrow / title) only — body sits full-width below */
      .tgw-card-head {
        display: flex;
        gap: 1rem;
        align-items: flex-start;
      }
      .tgw-head-text {
        flex: 1 1 auto;
        min-width: 0;
        padding-right: 2.2rem; /* clears the star button */
      }
      .tgw-card-body { margin-top: 0.65rem; }

      /* star / save button — top-right corner */
      .tgw-star {
        position: absolute;
        top: 0.8rem;
        right: 0.85rem;
        width: 2rem;
        height: 2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0;
        border: none;
        background: transparent;
        cursor: pointer;
        font-size: 1.35rem;
        line-height: 1;
        color: var(--tgw-ink-faint);
        border-radius: 50%;
        transition: transform 0.12s ease, color 0.12s ease, background 0.12s ease;
        z-index: 2;
      }
      .tgw-star:hover { background: rgba(245, 197, 66, 0.16); color: #e0a81e; transform: scale(1.12); }
      .tgw-star.is-starred { color: #f0b400; }
      .tgw-star.is-starred .tgw-star-glyph { filter: drop-shadow(0 1px 1px rgba(224, 168, 30, 0.45)); }

      /* mascot avatar — circle frame, image fully visible (not cropped) */
      .tgw-avatar {
        flex: 0 0 auto;
        width: 3rem;
        height: 3rem;
        border-radius: 50%;
        object-fit: contain;
        padding: 0.3rem;
        background: rgba(184, 216, 240, 0.4);
        opacity: 0.95;
      }

      .tgw-eyebrow {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.4rem;
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--tgw-ink-faint);
        margin-bottom: 0.3rem;
        font-size: 1rem;
      }
      .tgw-sep { color: var(--tgw-purple-line); }
      .tgw-live {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: var(--tgw-coral);
      }

      .tgw-title {
        font-family: "Alegreya", sans-serif;
        text-align: left;
        font-weight: bold;
        font-size: 1.4rem;
        line-height: 1.22;
        color: rgba(85, 45, 155, 0.95);
        margin: 0 0 0.5rem;
      }
      @media (min-width: 600px) { .tgw-title { font-size: 1.55rem; } }

      .tgw-chips { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-bottom: 0.6rem; }
      .tgw-chip-tag {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.82rem;
        text-transform: lowercase;
        padding: 0.15rem 0.6rem;
        border-radius: 2rem;
        background: rgba(221, 213, 230, 0.55);
        color: var(--tgw-purple);
      }

      .tgw-desc {
        font-family: "Merriweather", serif;
        font-size: 0.9rem;
        line-height: 1.65;
        color: rgba(14, 8, 42, 0.68);
        margin: 0;
      }
      .tgw-desc a { color: var(--tgw-purple); font-weight: bold; }

      .tgw-loc {
        font-family: "Merriweather", serif;
        font-size: 0.82rem;
        color: var(--tgw-ink-soft);
        margin: 0.5rem 0 0;
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.15rem 0.4rem;
        line-height: 1.4;
      }
      .tgw-addr-link { text-decoration: none; }
      .tgw-addr {
        font-size: 0.76rem;
        color: var(--tgw-ink-faint);
        text-decoration: underline dotted rgba(14, 8, 42, 0.25);
      }

      /* footer action row — "info on the left, tools on the right".
         A space-between flex pushes the left cluster (price + registration)
         away from the right cluster (share + add-to-calendar). Both clusters
         wrap internally so nothing overflows on narrow cards. */
      .tgw-actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        align-items: center;
        gap: 0.5rem 0.75rem;
        margin-top: 0.85rem;
        padding-top: 0.75rem;
        border-top: 1px dashed var(--tgw-purple-soft);
      }
      .tgw-actions-left,
      .tgw-actions-right {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem;
        min-width: 0;
      }
      .tgw-actions-left { justify-content: flex-start; }
      .tgw-actions-right { justify-content: flex-end; }
      /* if either cluster is empty it shouldn't claim a flex slot */
      .tgw-actions-left:empty,
      .tgw-actions-right:empty { display: none; }

      .tgw-action {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.85rem;
        line-height: 1.3;
        text-decoration: none;
        padding: 0.3rem 0.8rem;
        border-radius: 1rem;
        border: none;
        cursor: pointer;
        transition: all 0.12s ease;
        white-space: nowrap;
      }
      .tgw-register {
        background: var(--tgw-purple);
        color: #fff;
        /* registration blurbs can be a full sentence — let this one wrap
           instead of forcing the card wider. Only the register button wraps;
           share / calendar stay on a single line. */
        white-space: normal;
        text-align: center;
        max-width: 100%;
      }
      .tgw-register:hover { filter: brightness(1.08); color: #fff; }
      .tgw-share,
      .tgw-cal {
        border: 1.5px solid var(--tgw-purple-line);
        color: var(--tgw-purple);
        background: rgba(255, 255, 255, 0.8);
      }
      .tgw-share:hover,
      .tgw-cal:hover { background: var(--tgw-purple-soft); }
      .tgw-share.is-copied {
        border-color: rgba(103, 204, 94, 0.6);
        background: rgba(103, 204, 94, 0.18);
        color: #2f7a2a;
      }
      /* "Cover at the door." now reads as a pill, matching the price chip
         it usually sits beside. */
      .tgw-action-note {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.8rem;
        padding: 0.25rem 0.7rem;
        border-radius: 1rem;
        background: rgba(14, 8, 42, 0.06);
        color: var(--tgw-ink-soft);
        white-space: nowrap;
      }
      .tgw-price {
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        font-size: 0.8rem;
        padding: 0.25rem 0.7rem;
        border-radius: 1rem;
        background: rgba(14, 8, 42, 0.06);
        color: var(--tgw-ink-soft);
        white-space: nowrap;
      }
      .tgw-price.is-free { background: rgba(103, 204, 94, 0.18); color: #2f7a2a; }

      /* empty state */
      .tgw-empty {
        text-align: center;
        padding: 3rem 1rem;
        font-family: "Merriweather", serif;
        color: var(--tgw-ink-soft);
      }
      .tgw-clear-all {
        margin-top: 0.8rem;
        font-family: "Alegreya", sans-serif;
        font-weight: bold;
        background: var(--tgw-purple);
        color: #fff;
        border: none;
        border-radius: 2rem;
        padding: 0.4rem 1.2rem;
        cursor: pointer;
      }

      .tgw-tag-reset {
        display: flex;
        justify-content: center;
        margin: 0.5rem 0;
      }
      .tgw-tag-reset-link {
        display: inline-flex;
        align-items: center;
        gap: 0.85rem;
        font-family: "Merriweather", serif;
        font-size: 0.85rem;
        color: var(--tgw-ink-soft);
        background: transparent;
        border: none;
        cursor: pointer;
        padding: 0.3rem 0.4rem;
        text-decoration: underline dotted rgba(95, 50, 243, 0.4);
        text-underline-offset: 3px;
        transition: color 0.12s ease;
      }
      .tgw-tag-reset-link:hover { color: var(--tgw-purple); }
      .tgw-tag-reset-link span { color: var(--tgw-purple); font-weight: bold; }

      /* ── DESKTOP TWEAKS ────────────────────────────────────── */
      @media (min-width: 768px) {
        .tgw-day-num { font-size: 3rem; }
        .tgw-day-name { font-size: 1.75rem; }
        .tgw-avatar { width: 3.5rem; height: 3.5rem; }
        .tgw-card { padding: 1.5rem 1.6rem; gap: 1.25rem; }
      }

      /* ── MOBILE ────────────────────────────────────────────── */
      @media (max-width: 767px) {
        /* tighter vertical rhythm up top */
        .tgw-now { padding: 0 0.6rem; }
        .tgw-now-inner.tgw-countdown { margin-top: 0; padding: 1.1rem 0.9rem 1rem; }
        .tgw-controls-inner { padding: 0.4rem 0.5rem 0.5rem; }

        /* All seven days fit in the track without sideways scroll: no gap,
           minimal padding, pills share the width evenly. */
        .tgw-day-row {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          scrollbar-width: none;
          flex-wrap: nowrap;
          gap: 0;
          padding: 0.22rem;
        }
        .tgw-day-row::-webkit-scrollbar { display: none; }
        .tgw-day-pill { flex: 1 1 0; min-width: 0; padding-left: 0; padding-right: 0; }
        .tgw-day-pill--all { flex: 0 0 auto; padding-left: 5px; padding-right: 5px; }
        .tgw-all-full { display: none; }
        .tgw-all-short { display: inline; }

        /* Day pills stack the abbreviation over the date and drop the event
           count, so "THU / 11" fits without crowding. */
        .tgw-day-pill .tgw-pill-top {
          flex-direction: column;
          align-items: center;
          gap: 0;
          line-height: 1.1;
        }
        .tgw-day-pill .tgw-pill-count { display: none; }

        /* Type + quick filters are always visible on mobile — they're compact
           enough that hiding them behind a toggle wasn't worth the friction.
           Tighten the gaps and shrink the chips so they pack in neatly. */
        .tgw-type-row { display: flex; gap: 0.3rem; }
        .tgw-quick-row { gap: 0.3rem; }
        .tgw-type-chip { font-size: 0.85rem; padding: 0.15rem 0.55rem; }

        .tgw-now-inner { flex-direction: column; }
        .tgw-begun-title { font-size: 1.6rem; }
        .tgw-begun-sub { font-size: 0.85rem; }

        /* Card: only the header (avatar + title) shares a row; the body runs
           full width below, so the avatar no longer shoves the text over. */
        .tgw-card { padding: 1.1rem; }
        .tgw-card-head { gap: 0.7rem; }
        .tgw-avatar { width: 2.6rem; height: 2.6rem; }
        .tgw-actions-right { justify-content: flex-start; }
      }
      
    </style>
  </head>
