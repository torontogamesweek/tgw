<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sponsors</title>

<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; }
  body{
    background:#e9e9ee;            /* grey margin = clear crop edge */
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px;
  }
  .slide{
    background:#ffffff;
    width:min(100%, 1280px);
    aspect-ratio:16 / 9;           /* matches a standard Google Slide */
    padding:clamp(18px, 2.6vw, 40px);
    display:grid;
    grid-template-columns:repeat(10, 1fr);
    grid-template-rows:repeat(5, 1fr);
    gap:clamp(8px, 1.2vw, 18px);
    place-items:center;
  }
  .slide img{
    max-width:88%;
    max-height:88%;
    object-fit:contain;
  }
</style>
</head>
<body>
  <section class="slide" id="grid"></section>
<script>
  // [sponsor name, exact file name]
  const SPONSORS = [
    ["AMD", "TGW26_LogoSm_AMD.png"],
    ["Baby Ghosts", "TGW26_LogoSm_Baby-Ghosts.png"],
    ["Bonus Stage", "TGW26_LogoSm_Bonus-Stage.png"],

    ["XP Gaming Inc.", "TGW26_LogoSm_XP-Gaming.png"],
    ["York University", "TGW26_LogoSm_YorkU.png"]
  ];

  SPONSORS.sort((a, b) => a[0].localeCompare(b[0], "en", { sensitivity: "base" }));

  const grid = document.getElementById("grid");
  SPONSORS.forEach(([name, file]) => {
    const img = document.createElement("img");
    img.src = "images/logos/2026/" + encodeURIComponent(file);
    img.alt = name;
    img.loading = "lazy";
    grid.appendChild(img);
  });
</script>
</body>
</html>
